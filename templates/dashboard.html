<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Shield | Safety Dashboard</title>
</head>
<body>
    <div class="glass-card" style="max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="margin:0;">Safety Dashboard</h2>
            <a href="/logout" style="color: var(--red); text-decoration: none; font-size: 14px; font-weight: 600;">Logout</a>
        </div>

        <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px;">
            <h3 style="margin-top: 0; font-size: 16px;">Verify Identity</h3>
            <input id="vid" placeholder="Enter Worker Shield ID (SH-XXXX)">
            <button onclick="verify()" class="btn-pink">Run AI Safety Scan</button>
            <div id="v-res" style="display:none; margin-top: 20px;"></div>
        </div>

        <h3 style="font-size: 16px;">Log Behavioral Report</h3>
        <input id="rsid" placeholder="Worker Shield ID">
        <select id="rstar">
            <option value="5">⭐⭐⭐⭐⭐ Professional</option>
            <option value="4">⭐⭐⭐⭐ Good</option>
            <option value="3">⭐⭐⭐ Average</option>
            <option value="2">⭐⭐ Suspicious</option>
            <option value="1">⭐ High Risk</option>
        </select>
        <textarea id="rrev" rows="3" placeholder="Describe behavior (AI scans for 100+ Red Flags)..."></textarea>
        <button onclick="rate()" class="btn-outline">Submit Community Log</button>
    </div>

    <script>
        function verify() {
            const sid = document.getElementById('vid').value;
            fetch('/verify/' + sid).then(r => r.json()).then(d => {
                const res = document.getElementById('v-res');
                res.style.display = 'block';
                if(d.exists) {
                    const badgeClass = d.status === 'High Risk' ? 'risk-high' : 'risk-safe';
                    res.innerHTML = `
                        <div style="border-top: 1px solid var(--border); padding-top: 15px;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span><b>${d.name.toUpperCase()}</b> (${d.category})</span>
                                <span class="badge ${badgeClass}">${d.status}</span>
                            </div>
                            <p style="font-size:14px; color:var(--text-muted); margin: 5px 0;">Safety Score: ⭐ ${d.rating} / 5</p>
                        </div>`;
                } else {
                    res.innerHTML = `<div class="alert alert-error">⚠️ UNKNOWN ID: DO NOT TRUST</div>`;
                }
            });
        }
        function rate() {
            const data = {
                sid: document.getElementById('rsid').value,
                rating: document.getElementById('rstar').value,
                review: document.getElementById('rrev').value
            };
            fetch('/rate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(r => r.json()).then(d => {
                alert(d.message);
                location.reload();
            });
        }
    </script>
</body>
</html>
