<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Shield | Identity & Safety</title>
</head>
<body>
    <div class="auth-screen">
        <div class="auth-card">
            
            <div style="margin-bottom: 35px;">
                <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
                <h1 style="margin: 0; letter-spacing: 4px; color: var(--pink);">SHIELD</h1>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Identity & Safety Network</p>
            </div>

            {% if error %}<div class="alert-error" style="padding:10px; margin-bottom:15px; border-radius:8px; background:rgba(239,68,68,0.1); color:#ef4444; font-size:13px;">{{ error }}</div>{% endif %}
            {% if success %}<div class="alert-success" style="padding:10px; margin-bottom:15px; border-radius:8px; background:rgba(16,185,129,0.1); color:#10b981; font-size:13px;">{{ success }}</div>{% endif %}

            {% if mode == "login" %}
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-pink">Sign In to Command Center</button>
            </form>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 25px;">
                New to the network? <a href="javascript:void(0)" onclick="toggleMode('signup')" style="color: var(--pink); text-decoration: none;">Create Account</a>
            </p>

            {% else %}
            <form action="/signup" method="POST">
                <input type="text" name="username" placeholder="Choose Unique Username" required>
                <input type="password" name="password" placeholder="Create Password" required>
                
                <select name="role" id="role-select" onchange="updateForm()">
                    <option value="client">I am a Client (Requesting Service)</option>
                    <option value="worker">I am a Worker (Providing Service)</option>
                </select>

                <div id="client-fields">
                    <input type="text" name="house_code" placeholder="Family Invite Code (Optional)">
                    <p style="font-size: 10px; color: var(--text-muted); margin: -10px 0 15px 5px; text-align: left;">Leave blank to start a new household.</p>
                </div>

                <div id="worker-fields" style="display: none;">
                    <input type="text" name="category" placeholder="Service (Uber, Swiggy, Plumbing, etc.)">
                </div>

                <button type="submit" class="btn-pink">Register Secure Account</button>
            </form>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 25px;">
                Already have an account? <a href="javascript:void(0)" onclick="toggleMode('login')" style="color: var(--pink); text-decoration: none;">Log In</a>
            </p>
            {% endif %}

        </div>
    </div>

    <script>
        function toggleMode(mode) {
            window.location.href = (mode === 'signup') ? '/signup_page' : '/';
        }

        function updateForm() {
            const role = document.getElementById('role-select').value;
            document.getElementById('client-fields').style.display = (role === 'client') ? 'block' : 'none';
            document.getElementById('worker-fields').style.display = (role === 'worker') ? 'block' : 'none';
        }

        // Add this to your app.py to handle the signup_page route
    </script>
</body>
</html>
