<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Shield | Secure Access</title>
</head>
<body>
    <div class="glass-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
            <h1 style="color: var(--pink); margin: 0; font-size: 28px;">SHIELD</h1>
            <p style="color: var(--text-muted); font-size: 14px;">Identity & Safety Network</p>
        </div>

        {% if error %}<div class="alert alert-error">{{error}}</div>{% endif %}
        {% if success %}<div class="alert alert-success">{{success}}</div>{% endif %}

        <div id="login-box" class="{% if mode == 'signup' %}hidden{% endif %}">
            <form action="/login" method="POST">
                <label style="font-size: 11px; color: var(--text-muted);">USERNAME</label>
                <input name="username" placeholder="e.g. himali_99" required>
                <label style="font-size: 11px; color: var(--text-muted);">PASSWORD</label>
                <input type="password" name="password" placeholder="••••••••" required>
                <button type="submit" class="btn-pink">Sign In</button>
            </form>
            <p style="text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 25px;">
                New here? <a href="javascript:void(0)" onclick="toggle()" style="color: var(--pink); font-weight: 600;">Create Account</a>
            </p>
        </div>

        <div id="signup-box" class="{% if mode != 'signup' %}hidden{% endif %}">
            <form action="/signup" method="POST">
                <input name="username" placeholder="Choose Unique Username" required>
                <input type="password" name="password" placeholder="Create Password" required>
                <select name="role" id="roleSelect" onchange="showWorkerOptions()">
                    <option value="client">I am a Client</option>
                    <option value="worker">I am a Service Worker</option>
                </select>
                
                <div id="client-opt">
                    <input name="house_code" placeholder="Family Invite Code (Optional)" style="border-color: var(--pink);">
                    <p style="font-size: 11px; color: var(--text-muted); margin-top: -10px; margin-bottom: 15px;">Leave blank to create a new household.</p>
                </div>

                <div id="worker-opt" class="hidden">
                    <input name="category" placeholder="Service (Uber, Delivery, etc.)">
                </div>
                
                <button type="submit" class="btn-pink">Register Account</button>
            </form>
            <p style="text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 25px;">
                Have an account? <a href="javascript:void(0)" onclick="toggle()" style="color: var(--pink); font-weight: 600;">Log In</a>
            </p>
        </div>
        
        </div>

    <script>
        function toggle() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('signup-box').classList.toggle('hidden');
        }
        
        function showWorkerOptions() {
            const role = document.getElementById('roleSelect').value;
            // Toggle visibility based on the selected role
            document.getElementById('worker-opt').className = role === 'worker' ? '' : 'hidden';
            document.getElementById('client-opt').className = role === 'client' ? '' : 'hidden';
        }
    </script>
</body>
</html>
