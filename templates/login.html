<!DOCTYPE html>
<html>
<head>
  <title>Login | SafeNet</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="login-container">
  <div class="left-panel">
    <h1>Shield 🛡️</h1>
    <p>Empowering women through community-driven safety and verified identity checks.</p>
  </div>

  <div class="right-panel">
    <h2>Welcome Back</h2>
    
    {% if error %}
      <div style="background: #ffe5e5; color: red; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        {{error}}
      </div>
    {% endif %}

    <form action="/login" method="POST">
      <label style="font-size: 14px; font-weight: bold; color: var(--text-light);">Username</label>
      <input name="username" placeholder="Enter your username" required>

      <label style="font-size: 14px; font-weight: bold; color: var(--text-light);">Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>

      <button type="submit">Log In</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-light);">
      System automatically registers new users for this prototype.
    </p>
  </div>
</div>

</body>
</html>
