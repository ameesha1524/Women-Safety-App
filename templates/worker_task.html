<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Active Task | Shield</title>
    <style>
        .status-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: left;
        }
        .locked-text {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        .reveal-glow {
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="glass-card" style="text-align: center;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="badge" id="status-badge" style="background: rgba(239, 68, 68, 0.1); color: var(--red);">NAVIGATING</span>
            <span style="font-size: 12px; color: var(--text-muted);" id="distance-text">Calculating...</span>
        </div>

        <h2 style="margin: 0 0 10px 0;">Active Service Task</h2>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 30px;">Stealth Handoff Protocol is ACTIVE.</p>

        <div class="status-container">
            <p style="font-size: 11px; color: var(--text-muted); margin: 0;">DESTINATION ADDRESS</p>
            <h3 id="address-display" class="locked-text">LOCKED: REACH ZONE</h3>
        </div>

        <div class="status-container">
            <p style="font-size: 11px; color: var(--text-muted); margin: 0;">SECURE ENTRY CODE</p>
            <h3 id="code-display" class="locked-text">****</h3>
        </div>

        <div id="navigation-msg" style="font-size: 12px; color: var(--pink); margin-bottom: 25px;">
            Please move toward the Koramangala drop-off zone.
        </div>

        <button onclick="window.location.href='/profile'" class="btn-outline">Return to Profile</button>
    </div>

    <script>
        function updateWorkerTask() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(function(position) {
                const payload = {
                    worker_lat: position.coords.latitude,
                    worker_lng: position.coords.longitude
                };

                fetch('/api/v1/secure_delivery_info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                })
                .then(r => r.json())
                .then(data => {
                    const addr = document.getElementById('address-display');
                    const code = document.getElementById('code-display');
                    const badge = document.getElementById('status-badge');
                    const msg = document.getElementById('navigation-msg');
                    const dist = document.getElementById('distance-text');

                    dist.innerText = data.message.split(' (')[1]?.replace(')', '') || "Calculating...";
                    msg.innerText = data.message;

                    if (data.status === "UNLOCKED") {
                        addr.innerText = data.address;
                        addr.className = "reveal-glow";
                        code.innerText = data.entry_code;
                        code.className = "reveal-glow";
                        badge.innerText = "ARRIVED";
                        badge.style.background = "rgba(16, 185, 129, 0.1)";
                        badge.style.color = "var(--green)";
                    }
                });
            });
        }

        // Poll the server every 5 seconds to track movement
        setInterval(updateWorkerTask, 5000);
        updateWorkerTask(); // Initial call
    </script>
</body>
</html>
